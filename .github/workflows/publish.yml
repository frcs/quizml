name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"  # Triggers on version tags e.g. v0.11.0

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    
    # Required permissions for Trusted Publishing
    permissions:
      id-token: write  # Needed for PyPI trusted publisher
      contents: read   # Needed to checkout the repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by setuptools-scm to read git history/tags

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Package
        run: |
          uv build
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
